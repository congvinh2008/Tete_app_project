<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Ranger Monitor AI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    background:#2e7d32;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:#e0e0e0;
    width:420px;
    padding:50px 40px;
    border-radius:25px;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
    text-align:center;
}

.title{
    font-size:26px;
    font-weight:bold;
    color:#2e7d32;
    margin-bottom:35px;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:18px;
    border-radius:12px;
    border:1px solid #bbb;
    font-size:16px;
    outline:none;
}

input:focus{
    border:1px solid #2e7d32;
}

button{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:20px;
    background:#2e7d32;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#256628;
}

.back{
    background:#757575;
}

.back:hover{
    background:#5a5a5a;
}
</style>
</head>

<body>

<div class="card">
    <div class="title">🌿 Create Account</div>

    <input type="text" id="username" placeholder="Username">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <input type="password" id="confirmPassword" placeholder="Confirm Password">

    <button onclick="goRegister()">Register</button>
    <button class="back" onclick="location.href = '/login'">Back to Login</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-analytics.js";
import { getAuth, createUserWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyCS3M9ZGf_G8ST8aZytnr0X5fVdQP1iepQ",
    authDomain: "tete-47482.firebaseapp.com",
    projectId: "tete-47482",
    storageBucket: "tete-47482.firebasestorage.app",
    messagingSenderId: "1080578060068",
    appId: "1:1080578060068:web:6ba3f600be8c938a8e4db1",
    measurementId: "G-5XYWH53TRY"
};

const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const auth = getAuth(app);

window.goRegister = function(){

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if(password !== confirmPassword){
        alert("Mật khẩu không khớp!");
        return;
    }

    if(password.length < 6){
        alert("Mật khẩu phải ít nhất 6 ký tự!");
        return;
    }

    createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
        alert("Đăng ký thành công!");
        window.location.href = "/login";
    })
    .catch((error) => {
        alert(error.message);
    });
}

</script>

</body>
</html>
