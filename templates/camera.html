<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ranger Monitor AI - Solo View</title>

  <style>
    :root {
      --bg-dark-green: #0b1a03;
      --frame-bg: #1a2e11;
      --label-bg: rgba(0, 0, 0, 0.7);
      --accent-green: #8bc34a;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-dark-green);
      font-family: "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      color: white;
      overflow: hidden;
    }

    header {
      width: 100%;
      padding: 20px 0;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 5;
    }

    .back-btn {
      position: absolute;
      left: 20px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      padding: 8px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .monitor-grid {
      width: 95%;
      flex-grow: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 25px;
    }

    .cam-frame {
      position: relative;
      background: var(--frame-bg);
      border-radius: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      overflow: hidden;
    }

    .cam-frame:hover {
      border: 1px solid var(--accent-green);
    }

    .cam-frame.fullscreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9999;
      border-radius: 0;
      background: black;
    }

    .exit-fs {
      display: none;
      position: absolute;
      top: 20px;
      left: 20px;
      background: var(--label-bg);
      border: 1px solid white;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: bold;
      z-index: 10001;
    }

    .cam-frame.fullscreen .exit-fs {
      display: block;
    }

    .cam-label {
      position: absolute;
      top: 15px;
      left: 15px;
      background: var(--label-bg);
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: bold;
      border-left: 3px solid var(--accent-green);
    }

    /* 🔥 ADD */
    #label-container {
      margin-top: 10px;
      font-size: 18px;
      font-weight: bold;
    }

    canvas {
      max-width: 100%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>
  <button class="back-btn" onclick="location.href='/'">Back</button>
  <div style="font-size:22px;font-weight:600;">🌿 Ranger Monitor AI</div>
</header>

<main class="monitor-grid">

  <!-- CAM 1 (AI CAMERA) -->
  <div class="cam-frame" id="cam1" onclick="openFull(this)">
    <button class="exit-fs" onclick="closeFull(event, 'cam1')">❮ Exit</button>
    <div class="cam-label">AI CAM</div>

    <!-- 🔥 FIX: stop click + layout -->
    <div onclick="event.stopPropagation()" style="text-align:center; width:100%;">

      <!-- Hidden image stream -->
      <img id="ipcam"
           src="http://192.168.1.3:8080/video"
           crossorigin="anonymous"
           style="display:none;" />

      <!-- Canvas -->
      <canvas id="canvas" width="400" height="300"></canvas>

      <!-- 🔥 ADD loading text -->
      <div id="label-container">⏳ Đang khởi động AI...</div>

    </div>
  </div>

  <!-- CAM 2 (IP CAMERA) -->
  <div class="cam-frame" id="cam2" onclick="openFull(this)">
    <button class="exit-fs" onclick="closeFull(event, 'cam2')">❮ Exit</button>
    <div class="cam-label">CAM 2</div>

    <img src="http://192.168.1.3:8080/video" width="100%" />
  </div>

</main>

<!-- FULLSCREEN SCRIPT -->
<script>
function openFull(el) {
  if (!el.classList.contains("fullscreen")) {
    el.classList.add("fullscreen");
  }
}

function closeFull(event, id) {
  event.stopPropagation();
  document.getElementById(id).classList.remove("fullscreen");
}
</script>

<!-- ✅ FIX tmImage -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<!-- YOUR JS -->
<script src="/static/index.js"></script>

</body>
</html>
